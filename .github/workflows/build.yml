name: Build Native Audio Support Plugin

on:
  push:
    paths:
      - 'Cargo.toml'
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_release: ${{ steps.check_tag.outputs.exists == 'false' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version =' Cargo.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION already exists. Skipping release."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION does not exist. Proceeding with release."
          fi

  update-plugin-json:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Update plugin.json version
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          jq --arg v "$VERSION" '.version = $v' plugin.json > plugin.json.tmp && mv plugin.json.tmp plugin.json
          
      - name: Commit and Push changes
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Bump plugin.json version to ${{ needs.check-version.outputs.version }}"
          file_pattern: 'plugin.json'

      - name: Create Tag
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.check-version.outputs.version }}';
            let sha = '${{ steps.auto_commit.outputs.commit_hash }}';
            if (!sha) {
              sha = context.sha;
            }
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/v${version}`,
              sha: sha
            })

  build:
    needs: [check-version, update-plugin-json]
    if: needs.check-version.outputs.should_release == 'true'
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: native_audio_support.dll
            use_cross: false
            zip_name: native-audio-support-windows-x86_64.zip
            entry_point: native_audio_support.dll
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: libnative_audio_support.so
            use_cross: true
            zip_name: native-audio-support-linux-x86_64.zip
            entry_point: libnative_audio_support.so
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: libnative_audio_support.so
            use_cross: true
            zip_name: native-audio-support-linux-aarch64.zip
            entry_point: libnative_audio_support.so

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.check-version.outputs.version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross

      - name: Build Plugin DLL
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" == "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package Plugin
        shell: bash
        run: |
          mkdir -p package
          cp plugin.json package/
          
          # Use jq to update the entry_point in plugin.json
          jq --arg entry "${{ matrix.entry_point }}" '.entry_point = $entry' package/plugin.json > package/plugin.json.tmp && mv package/plugin.json.tmp package/plugin.json
          
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} package/${{ matrix.entry_point }}
            
            # Create Zip
            cd package
            7z a ../${{ matrix.zip_name }} *
          else
            cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} package/${{ matrix.entry_point }}
            
            # Create Zip
            cd package
            zip -r ../${{ matrix.zip_name }} *
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}
          retention-days: 1

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
